<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Soko Yetu</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="auth-header">
    <div class="container auth-header-inner">
      <a href="index.html" class="logo">
        <img src="images/logo.png" alt="Soko Yetu" class="logo-img" id="logoImg" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='inline-flex';">
        <span class="logo-fallback" id="logoFallback">Soko<span class="accent">Yetu</span></span>
      </a>
    </div>
  </header>

  <main class="error-page">
    <div class="error-card">
      <div class="error-code">404</div>
      <h1>This page took a wrong turn</h1>
      <p>The page you're looking for doesn't exist, may have moved, or the link might be broken.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">Back to home</a>
        <a href="browse.html" class="btn btn-outline">Browse listings</a>
      </div>
    </div>
  </main>

</body>
</html>
